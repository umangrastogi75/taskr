
services:
  taskr:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - taskr-data:/data
    environment:
      - DATA_FILE=/data/tasks.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  taskr-data:
